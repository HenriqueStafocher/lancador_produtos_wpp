<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Brechó</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='output.css') }}">
</head>
<body class="bg-linen min-h-screen">
    <a href="/login" id="logo" class="flex justify-center">
    <img src="{{ url_for('static', filename='assets/logo_brecho.png') }}" class="w-36 h-36 mt-2">
    </a>
    <div class="flex justify-center m-2">
        <button onclick="abrirModal()" id="btn_addproduto" class="hover:brightness-110 hover:animate-pulse font-bold py-3 px-6 rounded-full
        bg-gradient-to-r from-orange-200 to-red-500 text-white">Adicionar Produto</button>
    </div>
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-container">
            <h1 class="text-modal">Imagens</h1>
            <input type="file" id="imagens" accept="image/jpeg, image/png" multiple class="italic border-1 border-black rounded-lg p-2 mt-1 mb-3 bg-pencil-light cursor-pointer">
            <h1 class="text-modal">Título</h1>
            <input type="text" id="titulo" placeholder="Digite aqui o titulo do produto" class="placeholder_modal">
            <h1 class="text-modal">Descrição</h1>
            <textarea id="descricao" placeholder="Digite aqui a descrição do produto" class="placeholder_modal resize-none h-24"></textarea>
            <h1 class="text-modal">Preço</h1>
            <input type="number" id="preco" placeholder="Digite aqui o preço do produto" class="placeholder_modal">
            <div class="flex gap-2 mt-2 justify-center">
                <button onclick="fecharModal()" class="btn-vendido">Cancelar</button>
                <button onclick="confirmarProduto()" class="btn-whatsapp">Confirmar</button>
            </div>
        </div>
    </div>

<!-- Usando Jinja2 para puxar os produtos do Banco para o HTML -->
<div class="div-cards">
{% for produto in produtos %}
    <div id="produto-{{ produto[0] }}" class="card-produto flex flex-col">
        <img src="{{ produto[3] }}" alt="{{ produto[1] }}" class="card-imagem">
        <div class="p-2 flex flex-col flex-1">
            <p class="font-display text-xl text-ink font-semibold">{{ produto[1] }}</p>
            <p class="">ID: {{ produto[0] }}</p>
            <p class="font-display text-xl text-ink font-semibold">R$ {{ produto[7] }}</p>
            <p class="text-pencil mt-2">{{ produto[2] }}</p>
            <div class="flex gap-1 mt-auto justify-center">
                {% if session.get('logado') %}
                    <button onclick="deletarProduto({{produto[0]}})" class="btn-vendido">Vendido</button>
                    <button class="btn-alterar">Alterar</button>
                {% endif %}
                <button onclick="compartilhar({{ produto[0] }}, '{{ produto[1] }}', '{{ produto[2] }}', '{{ produto[3] }}')" class="btn-whatsapp">Compartilhar</button>
            </div>
        </div>
    </div>
{% endfor %}
</div>
    <script>
        const modal = document.getElementById('modal')
        function abrirModal() {
            modal.classList.remove('hidden')
        }
        function fecharModal() {
            modal.classList.add('hidden')
        }
        function confirmarProduto() {
            const titulo = document.getElementById('titulo').value
            const descricao = document.getElementById('descricao').value
            const imagens = document.getElementById('imagens').files
            const preco = document.getElementById('preco').value
            const formData = new FormData()
            formData.append('titulo', titulo)
            formData.append('descricao', descricao)
            formData.append('preco', preco)
            for(let i = 0; i < imagens.length; i++) {
                formData.append('imagens', imagens[i])
            }
            if (!titulo || !descricao || !preco || imagens.length === 0) {
                alert('Preencha todos os campos e adicione pelo menos uma imagem')
                return
            }
                     
            fecharModal()
            fetch('/adicionar', {
                method: 'POST',
                body: formData
            })
            .then(() => location.reload())
        }
        function deletarProduto(id) {
            const formData = new FormData()
            formData.append('id', id)

            fetch('/deletar', {
                method: 'POST',
                body: formData
                })
            .then(() => {
            document.getElementById('produto-' + id).remove()
                })
        }
        function compartilhar(id, titulo, descricao, img1) {
            const texto = `${titulo}\n${descricao}\n${id}`
            window.open('https://wa.me/?text=' + encodeURIComponent(texto))
            }
    </script>
<footer class="text-center p-4 text-pencil mt-8">
    Desenvolvido por Henrique Stafocher
</footer>
</body>
</html>
